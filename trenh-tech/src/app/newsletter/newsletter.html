<section class="newsletter section" id="nyhetsbrev">
  <div class="newsletter-inner">
    <div class="newsletter-header" [appScrollAnimate]="'scroll-visible'">
      <h2 class="newsletter-title">Nyhetsbrev</h2>
      <p class="newsletter-subtitle">Häng med i det senaste inom tech-världen</p>
    </div>

    <!-- Scroll track wrapper -->
    <div class="newsletter-scroll-wrapper">
      <div class="newsletter-cards-track" #cardsTrack>
        @for (article of articles; track article.title) {
          <div class="card">
            <div class="card-image">
              <img [src]="article.image" [alt]="article.alt" loading="lazy">
            </div>
            <h3 class="card-title">{{ article.title }}</h3>
          </div>
        }
      </div>

      <!-- Scroll indicators (desktop) -->
      <div class="scroll-hint">
        <span class="scroll-hint-dot"></span>
        <span class="scroll-hint-text">Scrolla för fler artiklar</span>
        <span class="scroll-hint-arrow">→</span>
      </div>
    </div>
  </div>
</section>
